[package]
name = "mavelin-client"
version = "0.1.0"
edition = "2024"

[features]
default = []
addons = ["dep:mavelin-addons"]
multiplayer = ["dep:mavelin-network", "dep:tokio"]

[dependencies]
mavelin-addons = { workspace = true, optional = true }
mavelin-engine.workspace = true
mavelin-network = { workspace = true, optional = true }
mavelin-physics.workspace = true
mavelin-shared = { workspace = true, features = ["convert", "color", "frustum", "face", "geometry"] }
mavelin-storage.workspace = true
mavelin-tween.workspace = true
mavelin-world.workspace = true
mavelin-worldgen.workspace = true

ahash.workspace = true
wgpu = { version = "29.0.0", git = "https://github.com/mavelin-project/wgpu.git", branch = "glutin" }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"], optional = true }

cpal = { version = "0.17.3", features = ["jack"] }
crossbeam-channel = "0.5.15"
kira = "0.12.1"
rayon = "1.12.0"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
bytemuck = { version = "1.25.0", features = ["derive"] }
indexmap = "2.14.0"
image.workspace = true
lyon_tessellation = "1.0.20"
swash = { version = "0.2.9", features = ["render"] }
euclid = { version = "0.22.14", features = ["bytemuck"] }
etagere = "0.3.0"
glam.workspace = true

[lints]
workspace = true
